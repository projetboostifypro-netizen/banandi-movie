name: Build Banandi Movie APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /tmp/apktool.jar
          printf '#!/bin/bash\njava -jar /tmp/apktool.jar "$@"\n' > /tmp/apktool
          chmod +x /tmp/apktool
          sudo mv /tmp/apktool /usr/local/bin/apktool
          apktool --version

      - name: Download original APK from release
        run: |
          wget -q \
            https://github.com/${{ github.repository }}/releases/download/source-apk/original.apk \
            -O original.apk
          ls -lh original.apk
          echo "✅ APK downloaded: $(du -sh original.apk | cut -f1)"

      - name: Decode APK with Apktool
        run: |
          apktool d original.apk -o apk_decoded --force
          echo "✅ APK decoded"
          ls apk_decoded/

      - name: Change app name to Banandi Movie
        run: |
          if [ -f "apk_decoded/res/values/strings.xml" ]; then
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Banandi Movie</string>|g' \
              apk_decoded/res/values/strings.xml
            echo "✅ App name updated:"
            grep "app_name" apk_decoded/res/values/strings.xml
          fi

      - name: Rebuild APK
        run: |
          apktool b apk_decoded -o banandi-movie-unsigned.apk
          echo "✅ APK rebuilt: $(du -sh banandi-movie-unsigned.apk | cut -f1)"

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore banandi.keystore \
            -alias banandi \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Banandi Movie, OU=Dev, O=Banandi, L=Paris, ST=IDF, C=FR" \
            -storepass banandi2024 \
            -keypass banandi2024 \
            -noprompt
          echo "✅ Keystore generated"

      - name: Sign APK
        run: |
          jarsigner \
            -keystore banandi.keystore \
            -storepass banandi2024 \
            -keypass banandi2024 \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            banandi-movie-unsigned.apk banandi
          echo "✅ APK signed"

      - name: Zipalign APK
        run: |
          sudo apt-get install -y zipalign -qq 2>/dev/null || true
          if command -v zipalign &> /dev/null; then
            zipalign -v 4 banandi-movie-unsigned.apk banandi-movie.apk
            echo "✅ APK aligned"
          else
            cp banandi-movie-unsigned.apk banandi-movie.apk
            echo "⚠️ zipalign not found, using unaligned APK"
          fi
          ls -lh banandi-movie.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Banandi-Movie-APK
          path: banandi-movie.apk
          retention-days: 90

      - name: Create Release with compiled APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "🎬 Banandi Movie v1.0.${{ github.run_number }}"
          body: |
            ## 🎬 Banandi Movie v1.0.${{ github.run_number }}

            ### Installation Android
            1. Téléchargez **banandi-movie.apk** ci-dessous
            2. Sur votre Android : **Paramètres → Sécurité → Sources inconnues** ✅
            3. Ouvrez le fichier APK et installez

            > Compatible Android 7.0+ | Connexion internet requise
          files: banandi-movie.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
