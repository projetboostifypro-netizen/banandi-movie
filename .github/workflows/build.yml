name: Build OnE+ Movie APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick webp zipalign python3 -qq
          echo "✅ Dependencies ready"

      - name: Install Apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /tmp/apktool.jar
          printf '#!/bin/bash\njava -jar /tmp/apktool.jar "$@"\n' > /tmp/apktool
          chmod +x /tmp/apktool
          sudo mv /tmp/apktool /usr/local/bin/apktool
          apktool --version

      - name: Download original APK
        run: |
          wget -q \
            https://github.com/${{ github.repository }}/releases/download/source-apk/original.apk \
            -O original.apk
          ls -lh original.apk

      - name: Decode APK
        run: |
          apktool d original.apk -o decoded --force
          echo "✅ APK decoded"

      # ============================================================
      # STEP 1 — RENAME APP TO OnE+ movie
      # ============================================================
      - name: Rename app to OnE+ movie
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">OnE+ movie</string>|g' \
            decoded/res/values/strings.xml
          echo "✅ App name → OnE+ movie"
          grep "app_name" decoded/res/values/strings.xml

      # ============================================================
      # STEP 2 — REMOVE MINE & PROMOTION TABS (TARGETED SMALI ONLY)
      # ============================================================
      - name: Find tab resource IDs from decoded resources
        run: |
          echo "=== Selector tab drawable IDs ==="
          grep -E 'name="selector_tab_' decoded/res/values/public.xml || true
          echo ""
          echo "=== Main tab string IDs ==="
          grep -E 'name="main_tab_' decoded/res/values/public.xml || true
          echo ""
          echo "=== Tab string values ==="
          grep -E 'name="main_tab_' decoded/res/values/strings.xml || true

      - name: Find and debug smali tab configuration file
        run: |
          python3 << 'PYEOF'
          import os, re, glob

          # Known selector_tab_* resource IDs (from public.xml analysis)
          # These appear together ONLY in the tab initialization method
          KNOWN_TAB_IDS = [
              '7f0804e1',  # selector_tab_channel
              '7f0804e2',  # selector_tab_home
              '7f0804e3',  # selector_tab_home_color
              '7f0804e4',  # selector_tab_mine
              '7f0804e5',  # selector_tab_rank
              '7f0804e6',  # selector_tab_small_video / Promotion
          ]

          # Also check main_tab_* string IDs
          KNOWN_STRING_IDS = [
              '7f120152',  # main_tab_channel
              '7f120153',  # main_tab_home
              '7f120154',  # main_tab_mine
              '7f120155',  # main_tab_rank
              '7f120156',  # main_tab_small_video
          ]

          ALL_TAB_IDS = KNOWN_TAB_IDS + KNOWN_STRING_IDS

          print("Searching for smali files containing multiple tab IDs...")
          print("(We ONLY touch files with 3+ tab IDs together)")
          print()

          smali_dirs = sorted(glob.glob('decoded/smali*'))
          print(f"Smali directories: {smali_dirs}")

          # Count tab IDs per file
          file_scores = {}
          for smali_dir in smali_dirs:
              for root_d, dirs, files in os.walk(smali_dir):
                  for fname in files:
                      if not fname.endswith('.smali'):
                          continue
                      fpath = os.path.join(root_d, fname)
                      try:
                          content = open(fpath, encoding='utf-8', errors='ignore').read().lower()
                          score = sum(1 for tid in ALL_TAB_IDS if tid in content)
                          if score >= 2:
                              file_scores[fpath] = score
                      except:
                          pass

          # Sort by score descending
          ranked = sorted(file_scores.items(), key=lambda x: -x[1])
          print(f"Files with 2+ tab IDs (ranked by count):")
          for fp, score in ranked[:15]:
              print(f"  [{score:2d} IDs] {fp}")

          print()

          # The tab configuration file should have the highest score
          # Show detailed content of top candidates
          for fp, score in ranked[:5]:
              print(f"\n{'='*80}")
              print(f"CANDIDATE FILE [{score} tab IDs]: {fp}")
              print('='*80)
              lines = open(fp, encoding='utf-8', errors='ignore').read().split('\n')
              for i, line in enumerate(lines):
                  line_lower = line.lower()
                  if any(tid in line_lower for tid in ALL_TAB_IDS):
                      start = max(0, i-10)
                      end = min(len(lines), i+15)
                      print(f"\n  --- Tab ID reference at line {i} ---")
                      for j in range(start, end):
                          marker = ">>>" if j == i else "   "
                          print(f"  {marker} L{j:4d}: {lines[j]}")

          # Save the best candidate
          if ranked:
              best_file, best_score = ranked[0]
              print(f"\n🎯 BEST CANDIDATE: {best_file} (score={best_score})")
              with open('/tmp/tab_config_file.txt', 'w') as f:
                  f.write(best_file)
          else:
              print("❌ No tab configuration file found!")
              with open('/tmp/tab_config_file.txt', 'w') as f:
                  f.write('')

          PYEOF

      - name: Remove Mine and Promotion tabs (TARGETED - only MainActivity smali)
        run: |
          python3 << 'PYEOF'
          import os, glob

          # ── Target: ONLY the MainActivity smali that initialises TabLayout$b items ──
          # From previous build analysis we know:
          #   Best file: decoded/smali_classes5/com/mfr/moviefr/ui/MainActivity.smali
          #   Each tab = new-instance TabLayout$b … ArrayList;->add() block
          # We scan for that file (or any smali with the TabLayout$b new-instance pattern)
          # and ONLY modify files that ARE the tab activity class.

          TAB_CLASS_PATTERN = 'Lcom/mfr/moviefr/widgets/tab/TabLayout$b;'
          LIST_ADD_PATTERN   = 'Ljava/util/ArrayList;->add(Ljava/lang/Object;)Z'

          # IDs that identify tabs we want to REMOVE:
          #   Mine:        selector_tab_mine (0x7f0804e4), main_tab_mine (0x7f120154)
          #   SmallVideo:  selector_tab_small_video (0x7f0804e6), main_tab_small_video (0x7f120156)
          #   Spiel:       selector_tab_spiel (0x7f0804e7), main_tab_spiel (0x7f120157)
          REMOVE_IDS = {
              '7f0804e4', '7f120154',   # Mine
              '7f0804e6', '7f120156',   # SmallVideo / Promotion
              '7f0804e7', '7f120157',   # Spiel / Jeu (extra game tab)
          }

          smali_dirs = sorted(glob.glob('decoded/smali*'))
          target_files = []

          for smali_dir in smali_dirs:
              for root_d, dirs, files in os.walk(smali_dir):
                  for fname in files:
                      if not fname.endswith('.smali'):
                          continue
                      fpath = os.path.join(root_d, fname)
                      try:
                          raw = open(fpath, encoding='utf-8', errors='ignore').read()
                          # Only touch files that both:
                          #   1. Contain new-instance TabLayout$b (so they do tab setup)
                          #   2. Are NOT R$drawable / R$string (constant definitions)
                          if (TAB_CLASS_PATTERN in raw
                                  and LIST_ADD_PATTERN in raw
                                  and 'R$drawable' not in fpath
                                  and 'R$string'   not in fpath):
                              target_files.append(fpath)
                      except:
                          pass

          print(f"Files with TabLayout$b new-instance AND ArrayList.add(): {target_files}")

          if not target_files:
              print("❌ No suitable file found. Aborting.")
              exit(0)

          total_modified = 0

          for fpath in target_files:
              print(f"\n{'='*70}")
              print(f"Processing: {fpath}")
              lines = open(fpath, encoding='utf-8', errors='ignore').read().split('\n')

              # ── Find all TabLayout$b blocks ─────────────────────────────────
              # A block starts at: new-instance vX, Lcom/mfr/moviefr/widgets/tab/TabLayout$b;
              # A block ends at:   invoke-virtual {v1, vX}, Ljava/util/ArrayList;->add(...)Z
              # (the add call may appear up to ~40 lines after the new-instance)

              skip_lines = set()
              i = 0
              while i < len(lines):
                  line = lines[i]
                  if 'new-instance' in line and TAB_CLASS_PATTERN in line:
                      block_start = i
                      block_end   = -1
                      # Scan forward for the ArrayList.add that closes this block
                      for j in range(i + 1, min(i + 60, len(lines))):
                          if LIST_ADD_PATTERN in lines[j]:
                              block_end = j
                              break
                          # Stop if we hit another new-instance (next tab starts)
                          if 'new-instance' in lines[j] and TAB_CLASS_PATTERN in lines[j]:
                              break

                      if block_end == -1:
                          print(f"  ⚠️  Block at L{block_start} has no ArrayList.add() – skipping")
                          i += 1
                          continue

                      # Check if this block contains a REMOVE_ID
                      block_text = '\n'.join(lines[block_start:block_end + 1]).lower()
                      matched_id = next((rid for rid in REMOVE_IDS if rid in block_text), None)

                      if matched_id:
                          print(f"  🗑️  Removing block L{block_start}–L{block_end} (contains {matched_id})")
                          for k in range(block_start, block_end + 1):
                              skip_lines.add(k)
                          i = block_end + 1
                      else:
                          # Identify which tab this is (for debug)
                          tab_name = 'unknown'
                          if '7f0804e2' in block_text:
                              tab_name = 'Home'
                          elif '7f0804e5' in block_text:
                              tab_name = 'Rank'
                          elif '7f0804e1' in block_text:
                              tab_name = 'Channel/Explorer'
                          print(f"  ✅ Keeping block L{block_start}–L{block_end} (Tab: {tab_name})")
                          i = block_end + 1
                  else:
                      i += 1

              if skip_lines:
                  new_lines = []
                  for idx, ln in enumerate(lines):
                      if idx in skip_lines:
                          new_lines.append('    # REMOVED: ' + ln)
                      else:
                          new_lines.append(ln)
                  with open(fpath, 'w', encoding='utf-8') as f:
                      f.write('\n'.join(new_lines))
                  print(f"\n  ✅ Modified {fpath} – removed {len(skip_lines)} lines")
                  total_modified += 1
              else:
                  print(f"\n  ⚠️  No blocks removed in {fpath}")

          print(f"\n✅ Total smali files modified: {total_modified}")
          PYEOF

      - name: Verify smali changes (show modified sections)
        run: |
          python3 << 'PYEOF'
          import glob, os

          TAB_BARE = ['7f0804e4', '7f120154', '7f0804e6', '7f120156']
          smali_dirs = sorted(glob.glob('decoded/smali*'))

          print("Checking for remaining mine/promotion tab references...")
          remaining = []
          for smali_dir in smali_dirs:
              for root_d, dirs, files in os.walk(smali_dir):
                  for fname in files:
                      if not fname.endswith('.smali'):
                          continue
                      fpath = os.path.join(root_d, fname)
                      try:
                          content = open(fpath, encoding='utf-8', errors='ignore').read().lower()
                          for tid in TAB_BARE:
                              if tid in content:
                                  # Check if it's only in REMOVED comments
                                  active_refs = [ln for ln in content.split('\n')
                                                 if tid in ln and '# REMOVED' not in ln]
                                  if active_refs:
                                      remaining.append((fpath, tid, active_refs[:3]))
                      except:
                          pass

          if remaining:
              print(f"\n⚠️  Found {len(remaining)} remaining active references to tab IDs:")
              for fp, tid, lines in remaining[:10]:
                  print(f"\n  File: {fp}, ID: {tid}")
                  for ln in lines:
                      print(f"    {ln[:100]}")
          else:
              print("✅ All mine/promotion tab IDs successfully removed or commented out!")
          PYEOF

      - name: Clear Mine and Promotion tab string labels
        run: |
          # Replace with empty (space) so tab labels show nothing
          sed -i 's|<string name="main_tab_mine">.*</string>|<string name="main_tab_mine"> </string>|g' \
            decoded/res/values/strings.xml
          sed -i 's|<string name="main_tab_small_video">.*</string>|<string name="main_tab_small_video"> </string>|g' \
            decoded/res/values/strings.xml
          sed -i 's|<string name="main_tab_spiel">.*</string>|<string name="main_tab_spiel"> </string>|g' \
            decoded/res/values/strings.xml
          sed -i 's|<string name="str_mine_extension">.*</string>|<string name="str_mine_extension"> </string>|g' \
            decoded/res/values/strings.xml
          sed -i 's|<string name="str_promotion">.*</string>|<string name="str_promotion"> </string>|g' \
            decoded/res/values/strings.xml
          echo "✅ Tab label strings cleared"
          grep -E "main_tab_" decoded/res/values/strings.xml

      # ============================================================
      # STEP 3 — GENERATE NEW OnE+ LOGO
      # ============================================================
      - name: Generate OnE+ movie logo (all densities)
        run: |
          mkdir -p /tmp/logos

          generate_logo() {
            local SIZE=$1
            local OUTPUT=$2
            local FONT_BIG=$(( SIZE * 32 / 100 ))
            local FONT_SMALL=$(( SIZE * 14 / 100 ))
            local OFFSET_UP=$(( SIZE * 8 / 100 ))
            local OFFSET_DOWN=$(( SIZE * 28 / 100 ))
            local BAR_Y1=$(( SIZE * 78 / 100 ))
            local BAR_Y2=$(( SIZE * 80 / 100 ))
            local BAR_X1=$(( SIZE * 10 / 100 ))
            local BAR_X2=$(( SIZE * 90 / 100 ))

            convert \
              -size ${SIZE}x${SIZE} \
              gradient:'#0a0a1a-#1a1040' \
              -fill '#FF6B00' \
              -stroke '#FF9500' \
              -strokewidth 2 \
              -font DejaVu-Sans-Bold \
              -pointsize $FONT_BIG \
              -gravity Center \
              -annotate +0-${OFFSET_UP} "OnE+" \
              -fill '#CCCCCC' \
              -stroke none \
              -font DejaVu-Sans \
              -pointsize $FONT_SMALL \
              -annotate +0+${OFFSET_DOWN} "movie" \
              -fill '#FF6B00' \
              -draw "rectangle ${BAR_X1},${BAR_Y1} ${BAR_X2},${BAR_Y2}" \
              "$OUTPUT"
          }

          generate_logo 48  /tmp/logos/mdpi.png
          generate_logo 72  /tmp/logos/hdpi.png
          generate_logo 96  /tmp/logos/xhdpi.png
          generate_logo 144 /tmp/logos/xxhdpi.png
          generate_logo 192 /tmp/logos/xxxhdpi.png
          echo "✅ All logo sizes generated"

      - name: Replace app icons with OnE+ logo
        run: |
          declare -A DENSITIES=(["mdpi"]="48" ["hdpi"]="72" ["xhdpi"]="96" ["xxhdpi"]="144" ["xxxhdpi"]="192")
          for DENSITY in "${!DENSITIES[@]}"; do
            DIR="decoded/res/mipmap-${DENSITY}"
            [ -d "$DIR" ] || continue
            cwebp -quiet /tmp/logos/${DENSITY}.png -o "$DIR/ic_launcher.webp" 2>/dev/null || \
              convert /tmp/logos/${DENSITY}.png "$DIR/ic_launcher.webp"
            cwebp -quiet /tmp/logos/${DENSITY}.png -o "$DIR/ic_launcher_round.webp" 2>/dev/null || \
              convert /tmp/logos/${DENSITY}.png "$DIR/ic_launcher_round.webp"
            cwebp -quiet /tmp/logos/${DENSITY}.png -o "$DIR/ic_launcher_foreground.webp" 2>/dev/null || \
              convert /tmp/logos/${DENSITY}.png "$DIR/ic_launcher_foreground.webp"
            echo "✅ Icons replaced in $DIR"
          done

      # ============================================================
      # STEP 4 — GENERATE NEW SPLASH SCREEN
      # ============================================================
      - name: Generate OnE+ splash screen
        run: |
          convert \
            -size 1080x1920 \
            gradient:'#05050f-#0d0d2b' \
            -fill '#FF6B00' \
            -font DejaVu-Sans-Bold \
            -pointsize 160 \
            -gravity Center \
            -annotate +0-120 "OnE+" \
            -fill '#FFFFFF' \
            -font DejaVu-Sans \
            -pointsize 70 \
            -annotate +0+60 "movie" \
            -fill '#FF6B00' \
            -draw "rectangle 340,1050 740,1056" \
            /tmp/logos/splash.png

          find decoded/res/ -name "ic_splash_window_temp.png" -exec cp /tmp/logos/splash.png {} \; -print
          grep -q "ic_splash_color" decoded/res/values/colors.xml 2>/dev/null && \
            sed -i 's|<color name="ic_splash_color">.*</color>|<color name="ic_splash_color">#05050f</color>|g' \
              decoded/res/values/colors.xml
          echo "✅ Splash screen updated"

      # ============================================================
      # STEP 5 — BUILD, SIGN & RELEASE
      # ============================================================
      - name: Verify all changes before build
        run: |
          echo "=== App name ==="
          grep "app_name" decoded/res/values/strings.xml
          echo "=== Tab labels ==="
          grep -E "main_tab_" decoded/res/values/strings.xml
          echo "=== Icons ==="
          ls -lh decoded/res/mipmap-xxhdpi/

      - name: Rebuild APK
        run: |
          apktool b decoded -o one-plus-movie-unsigned.apk
          ls -lh one-plus-movie-unsigned.apk
          echo "✅ APK rebuilt"

      - name: Download uber-apk-signer
        run: |
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar \
            -O /tmp/uber-apk-signer.jar
          echo "✅ uber-apk-signer ready"

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore one-plus.keystore \
            -alias oneplus \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=OnEPlus, OU=Dev, O=OnEPlus, L=Paris, ST=IDF, C=FR" \
            -storepass oneplus2024 \
            -keypass oneplus2024 \
            -noprompt
          echo "✅ Keystore generated"

      - name: Sign APK (V1+V2+V3)
        run: |
          java -jar /tmp/uber-apk-signer.jar \
            --apks one-plus-movie-unsigned.apk \
            --ks one-plus.keystore \
            --ksAlias oneplus \
            --ksKeyPass oneplus2024 \
            --ksPass oneplus2024 \
            --allowResign \
            --out .
          SIGNED=$(ls *-aligned-signed.apk 2>/dev/null | head -1)
          [ -z "$SIGNED" ] && SIGNED=$(ls *signed*.apk 2>/dev/null | head -1)
          echo "Signed: $SIGNED"
          cp "$SIGNED" one-plus-movie.apk
          ls -lh one-plus-movie.apk
          echo "✅ APK signed V1+V2+V3"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnE-Plus-Movie-APK
          path: one-plus-movie.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0.${{ github.run_number }}
          name: "🎬 OnE+ movie v3.0.${{ github.run_number }}"
          body: |
            ## 🎬 OnE+ movie v3.0.${{ github.run_number }}

            ### Corrections appliquées
            - ✅ Onglets "Le mien" et "Promotion" supprimés (smali ciblé uniquement)
            - ✅ Application renommée **OnE+ movie**
            - ✅ Nouveau logo **OnE+**
            - ✅ Nouvel écran de démarrage
            - ✅ APK signé V1+V2+V3 (compatible Android 6+)

            ### Installation Android
            1. Téléchargez **one-plus-movie.apk** ci-dessous
            2. **Paramètres → Sécurité → Sources inconnues** ✅
            3. Désinstallez l'ancienne version si présente
            4. Ouvrez le fichier APK et installez

            > Compatible Android 6.0+ | Connexion internet requise
          files: one-plus-movie.apk
          token: ${{ secrets.GITHUB_TOKEN }}
